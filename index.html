<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>WEBAPP-FIRE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>WEBAPP-FIRE</h1>
        <p>Bem-vindo ao WEBAPP-FIRE, a aplicação web para monitoramento de incêndios florestais.</p>

        <div id="label-container"></div>

        <h3>Testar com Arquivo (Dataset)</h3>
        <input type="file" id="file-input" accept="image/*" onchange="predictFromFile()">
        <div id="file-preview-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>
    <script src="js/script.js"></script>
</body>
</html>
